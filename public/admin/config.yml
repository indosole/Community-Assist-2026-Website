# ─────────────────────────────────────────────────────────────────────────────
# Decap CMS configuration — Community Assist
# Auth + Git Gateway via DecapBridge (PKCE). Values below are generated by the
# DecapBridge dashboard for this site (site id 6c328301-…). To change auth,
# regenerate from DecapBridge and replace the backend block.
#
# HOW EDITING WORKS: the client edits the fields below → Decap commits the changed
# JSON in src/data/ to GitHub → Netlify rebuilds → the live site updates.
#
# ⚠️ Decap rewrites each JSON file using ONLY the fields defined here. Every key in
#    the data files is represented below — do not delete fields or data will be lost.
# ─────────────────────────────────────────────────────────────────────────────

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: indosole/Community-Assist-2026-Website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/6c328301-348b-4a60-b526-e63589711d66/pkce
  auth_token_endpoint: /sites/6c328301-348b-4a60-b526-e63589711d66/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Adds "View live" links inside the editor.
site_url: https://www.communityassistbali.com
display_url: https://www.communityassistbali.com

# New image uploads land here; existing images in this folder are browsable too.
media_folder: "public/assets/img"
public_folder: "/assets/img"

locale: "en"

collections:
  # ── Global settings ────────────────────────────────────────────────────────
  - name: "settings"
    label: "Site settings"
    editor:
      preview: false
    files:
      - file: "src/data/site.json"
        name: "site"
        label: "Site & SEO"
        fields:
          - label: "SEO / social"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Browser title", name: "title", widget: "string" }
              - { label: "Meta description", name: "description", widget: "text" }
              - { label: "Theme colour (hex)", name: "themeColor", widget: "string" }
              - { label: "Social share title", name: "ogTitle", widget: "string" }
              - { label: "Social share description", name: "ogDescription", widget: "text" }
              - { label: "Social share image", name: "ogImage", widget: "image" }
              - { label: "Canonical URL", name: "url", widget: "string" }
          - label: "Navigation links"
            name: "nav"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Anchor (href)", name: "href", widget: "string" }
          - { label: "Donate button label", name: "donateLabel", widget: "string" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "WhatsApp (display)", name: "whatsapp", widget: "string" }
              - { label: "WhatsApp link", name: "whatsappUrl", widget: "string" }
              - { label: "Instagram link", name: "instagramUrl", widget: "string" }
              - { label: "Instagram label", name: "instagramLabel", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Beneficiaries line", name: "beneficiaries", widget: "text" }
              - { label: "Legal line", name: "legal", widget: "text" }

  # ── Page sections ──────────────────────────────────────────────────────────
  - name: "sections"
    label: "Page sections"
    editor:
      preview: false
    files:
      # 1 · Hero
      - file: "src/data/hero.json"
        name: "hero"
        label: "1 · Hero"
        fields:
          - { label: "Screen-reader heading", name: "srHeading", widget: "text" }
          - { label: "Hero image", name: "image", widget: "image" }
          - { label: "Image width (px)", name: "imageWidth", widget: "number", required: false, value_type: "int" }
          - { label: "Image height (px)", name: "imageHeight", widget: "number", required: false, value_type: "int" }
          - { label: "Image alt text", name: "imageAlt", widget: "text" }
          - label: "Primary button"
            name: "primaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "Secondary button"
            name: "secondaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "Trust chips"
            name: "trustChips"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      # 2 · Credibility band
      - file: "src/data/credibility.json"
        name: "credibility"
        label: "2 · Credibility band"
        fields:
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Accent colour?", name: "accent", widget: "boolean", default: false }
          - { label: "Partners label", name: "partnersLabel", widget: "string" }
          - label: "Partner logos"
            name: "partnerLogos"
            widget: "list"
            fields:
              - { label: "Logo", name: "src", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
              - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }

      # 3 · Mission
      - file: "src/data/mission.json"
        name: "mission"
        label: "3 · Mission"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - label: "Body paragraphs"
            name: "body"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text", hint: "HTML allowed (e.g. <strong>)" }
          - { label: "Collective eyebrow", name: "collectiveEyebrow", widget: "string" }
          - { label: "Collective heading", name: "collectiveHeading", widget: "string" }
          - label: "Partners"
            name: "partners"
            widget: "list"
            fields:
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Photo width", name: "photoWidth", widget: "number", required: false, value_type: "int" }
              - { label: "Photo height", name: "photoHeight", widget: "number", required: false, value_type: "int" }
              - { label: "Photo alt", name: "photoAlt", widget: "string" }
              - { label: "Portrait crop?", name: "portrait", widget: "boolean", default: false }
              - { label: "Logo", name: "logo", widget: "image" }
              - { label: "Logo width", name: "logoWidth", widget: "number", required: false, value_type: "int" }
              - { label: "Logo height", name: "logoHeight", widget: "number", required: false, value_type: "int" }
              - { label: "Logo alt", name: "logoAlt", widget: "string" }
              - { label: "Ragam logo style?", name: "ragamLogo", widget: "boolean", default: false }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Role style", name: "roleClass", widget: "select", options: ["founding", "scholar"] }
              - { label: "Description", name: "text", widget: "text", hint: "HTML allowed (e.g. <em>, <strong>)" }
              - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
              - { label: "Instagram handle", name: "instagramHandle", widget: "string" }

      # 4 · Impact stories
      - file: "src/data/impact.json"
        name: "impact"
        label: "4 · Impact stories"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Intro line", name: "intro", widget: "text", required: false }
          - { label: "Funding year", name: "fundingYear", widget: "number", value_type: "int", hint: "Shown in the 'Funded for 2026' badge; next year (2027) is worked out automatically." }
          - label: "Students"
            name: "stories"
            label_singular: "Student"
            widget: "list"
            summary: "{{fields.name}} · {{fields.status}}"
            hint: "Each student is a card in the scrollable carousel. Add, remove or drag to reorder."
            fields:
              - label: "Status"
                name: "status"
                widget: "select"
                default: "seeking"
                options:
                  - { label: "Seeking a sponsor", value: "seeking" }
                  - { label: "Funded (this year covered)", value: "funded" }
                  - { label: "Graduated", value: "graduated" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Tag (small label above the name)", name: "tag", widget: "string" }
              - label: "Story paragraphs"
                name: "paragraphs"
                widget: "list"
                hint: "The student's story, one paragraph per item. Two or three short paragraphs reads best."
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Photo", name: "img", widget: "image", hint: "For a video card this is the cover/poster image." }
              - { label: "Photo width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Photo height", name: "height", widget: "number", required: false, value_type: "int" }
              - { label: "Photo focus (object-position)", name: "objectPosition", widget: "string", required: false, hint: "e.g. '50% 30%' to shift the crop up/down." }
              - { label: "Photo alt text", name: "alt", widget: "string" }
              - { label: "Goal (Rp millions)", name: "goalM", widget: "number", required: false, value_type: "float", hint: "The amount to raise for this student. Rp 6M covers one school year; set it higher to cover several years through to graduation." }
              - { label: "Raised so far (Rp millions)", name: "raisedM", widget: "number", required: false, value_type: "float", hint: "How much has been raised toward the goal. This fills the progress bar. Placeholder numbers are fine for now, adjust anytime; leave blank to hide the bar and just show the yearly ask." }
              - { label: "Video (WebM, optional)", name: "videoWebm", widget: "file", required: false }
              - { label: "Video (MP4, optional)", name: "videoMp4", widget: "file", required: false, hint: "Add a video to turn this card into a testimonial with an unmute button." }
              - { label: "Video aria-label", name: "videoAlt", widget: "string", required: false }

      # 4b · Logo strip (scrolling marquee)
      - file: "src/data/logostrip.json"
        name: "logostrip"
        label: "4b · Logo strip"
        fields:
          - { label: "Label (small text above logos)", name: "label", widget: "string", required: false, hint: "Leave blank to hide the label." }
          - label: "Logos"
            name: "logos"
            widget: "list"
            hint: "Logos scroll in a loop. Use white / transparent logo files — they're shown white on the blue band."
            fields:
              - { label: "Logo", name: "src", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
              - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }

      # 5 · What your gift does
      - file: "src/data/gift.json"
        name: "gift"
        label: "5 · What your gift does"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "headingHtml", widget: "string", hint: "HTML allowed" }
          - label: "Benefit cards"
            name: "benefits"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "select", options: ["i-cap", "i-book", "i-shirt", "i-mentor", "i-heart", "i-star", "i-check"] }
              - { label: "Tile colour", name: "tile", widget: "select", options: ["t-pink", "t-blue", "t-yellow"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Animation delay", name: "delay", widget: "hidden" }
          - label: "Scholarship donut"
            name: "donut"
            widget: "object"
            fields:
              - { label: "Centre number", name: "centerNum", widget: "string" }
              - { label: "Centre label", name: "centerLabel", widget: "string" }
              - { label: "Chart aria-label", name: "ariaLabel", widget: "string" }
              - label: "Legend"
                name: "legend"
                widget: "list"
                fields:
                  - { label: "Swatch colour", name: "swatch", widget: "select", options: ["var(--blue)", "var(--orchid)", "var(--yellow)", "var(--pink)", "var(--green)"] }
                  - { label: "Label", name: "label", widget: "string" }

      # 6 · 2026 goal
      - file: "src/data/goal.json"
        name: "goal"
        label: "6 · 2026 goal"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Goal amount", name: "amount", widget: "string" }
          - { label: "Sub-line", name: "subHtml", widget: "string", hint: "HTML allowed" }
          - { label: "Progress (%)", name: "progress", widget: "number", value_type: "int", min: 0, max: 100 }
          - { label: "Progress label", name: "progressLabelLeft", widget: "string" }
          - { label: "Student image (left)", name: "studentLeft", widget: "image" }
          - { label: "Student left width", name: "studentLeftWidth", widget: "number", required: false, value_type: "int" }
          - { label: "Student left height", name: "studentLeftHeight", widget: "number", required: false, value_type: "int" }
          - { label: "Student image (right)", name: "studentRight", widget: "image" }
          - { label: "Student right width", name: "studentRightWidth", widget: "number", required: false, value_type: "int" }
          - { label: "Student right height", name: "studentRightHeight", widget: "number", required: false, value_type: "int" }
          - label: "Primary button"
            name: "primaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "Secondary button"
            name: "secondaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

      # 7 · Ways to Give
      - file: "src/data/give.json"
        name: "give"
        label: "7 · Ways to Give"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - label: "For individuals"
            name: "individuals"
            widget: "object"
            fields:
              - { label: "Heading", name: "headingHtml", widget: "string", hint: "HTML allowed (e.g. <br>)" }
              - { label: "Lead", name: "lead", widget: "text" }
              - label: "Button"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
              - label: "Donor ladder"
                name: "ladder"
                widget: "list"
                fields:
                  - { label: "Amount", name: "amt", widget: "string" }
                  - { label: "Value", name: "val", widget: "string" }
                  - { label: "Highlighted?", name: "highlight", widget: "boolean", default: false }
                  - { label: "Badge text", name: "badge", widget: "string", required: false }
          - label: "For businesses"
            name: "businesses"
            widget: "object"
            fields:
              - label: "Tiers"
                name: "tiers"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Scholarships line", name: "scholarships", widget: "string" }
                  - { label: "Featured?", name: "featured", widget: "boolean", default: false }
                  - { label: "Star icon?", name: "star", widget: "boolean", default: false }
                  - { label: "Badge text", name: "badge", widget: "string", required: false }
                  - label: "Features"
                    name: "features"
                    widget: "list"
                    field: { label: "Feature", name: "feature", widget: "string" }
                  - { label: "Email link (mailto)", name: "mailto", widget: "string" }
                  - { label: "Button label", name: "ctaLabel", widget: "string" }
              - { label: "Partner note", name: "partnerNoteHtml", widget: "text", hint: "HTML allowed" }

      # 8 · Events
      - file: "src/data/events.json"
        name: "events"
        label: "8 · Events"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - label: "Event cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Date", name: "date", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Venue", name: "venue", widget: "string" }
              - { label: "Blurb", name: "blurb", widget: "text" }
              - { label: "Image", name: "img", widget: "image" }
              - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Animation delay", name: "delay", widget: "hidden" }
          - label: "Be part of the day"
            name: "bePart"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Sub", name: "sub", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "Email link (mailto)", name: "mailto", widget: "string" }
              - label: "CTA button"
                name: "cta"
                widget: "object"
                required: false
                fields:
                  - { label: "Button label", name: "label", widget: "string" }
                  - { label: "Button link (URL)", name: "href", widget: "string", hint: "e.g. a Google Form link" }
          - label: "Past events"
            name: "pastEvents"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string", hint: "HTML allowed" }
              - { label: "Photos shown before 'Show more'", name: "initialVisible", widget: "number", required: false, value_type: "int", hint: "How many photos to show before a 'Show more' button appears. Leave blank to always show all." }
              - label: "Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Photo", name: "src", widget: "image" }
                  - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
                  - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }
                  - { label: "Alt", name: "alt", widget: "string" }
                  - { label: "Animation delay", name: "delay", widget: "hidden" }

      # 9 · Sponsors
      - file: "src/data/sponsors.json"
        name: "sponsors"
        label: "9 · Sponsors"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - label: "Champions"
            name: "champions"
            widget: "list"
            fields:
              - { label: "Logo", name: "src", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }
              - { label: "Grayscale (for crest logos that don't work as solid black)", name: "mono", widget: "boolean", default: false, required: false }
          - label: "Game Changers"
            name: "gameChangers"
            widget: "list"
            fields:
              - { label: "Logo", name: "src", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }
              - { label: "Grayscale (for crest logos that don't work as solid black)", name: "mono", widget: "boolean", default: false, required: false }
          - label: "Community Heroes (logos)"
            name: "communityHeroes"
            widget: "list"
            fields:
              - { label: "Logo", name: "src", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
              - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }
              - { label: "Grayscale (for crest logos that don't work as solid black)", name: "mono", widget: "boolean", default: false, required: false }
          - { label: "Community Heroes — 'more' line", name: "communityHeroesMore", widget: "string" }
          - { label: "CTA text", name: "ctaText", widget: "string" }
          - label: "CTA link"
            name: "ctaLink"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

      # 10 · Final CTA / Donate
      - file: "src/data/donate.json"
        name: "donate"
        label: "10 · Donate (final CTA)"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Sub", name: "sub", widget: "text" }
          - label: "Talk-to-us button"
            name: "talkCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "QRIS card (scan to donate)"
            name: "qris"
            widget: "object"
            fields:
              - { label: "Show QRIS card", name: "enabled", widget: "boolean", default: true }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "QR code image", name: "image", widget: "image", hint: "The QRIS QR. Keep it crisp/lossless so it always scans." }
              - { label: "QRIS logo", name: "logo", widget: "image", required: false }
              - { label: "Merchant name", name: "merchant", widget: "string" }
              - { label: "NMID", name: "nmid", widget: "string" }
              - { label: "Caption", name: "caption", widget: "text" }
              - { label: "Apps line", name: "apps", widget: "string", required: false }
              - { label: "Note", name: "note", widget: "string", required: false }
          - label: "Bank transfer card"
            name: "bank"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Fields"
                name: "fields"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value (shown)", name: "value", widget: "string" }
                  - { label: "Copy value", name: "copy", widget: "string" }
                  - { label: "Copy button aria-label", name: "aria", widget: "string" }
